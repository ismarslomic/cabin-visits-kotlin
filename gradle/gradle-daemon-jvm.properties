# Forces the Gradle daemon to run on Java 21 instead of the default JAVA_HOME (GraalVM 25).
# This is a workaround for detekt 1.23.x crashing with IllegalArgumentException on Java 25+ version strings.
# See: https://github.com/detekt/detekt/issues/8714
#
# The Dockerfile and native image build are unaffected — they use GraalVM 25 via the Docker base image.
#
# To remove this workaround:
#   1. Upgrade detekt to a version that supports Java 25 (fix is in 2.0.0, not backported to 1.23.x)
#   2. Delete this file
#   3. Remove the "Set up Java 21" step from .github/workflows/build.yml
toolchainVersion=21
toolchainVendor=amazon